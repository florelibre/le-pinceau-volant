<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}" />
</head>
<body{{ with .File }}{{ with .BaseFileName }} class="{{ . }}"{{ end }}{{ end }}>
  <header>
    <div class="container">
      <button id="menu-toggle" aria-expanded="false" aria-label="Ouvrir le menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <a href="{{ .Site.Home.RelPermalink }}" class="site-title">{{ .Site.Title }}</a>
    </div>
  </header>

  <div id="nav-overlay" role="dialog" aria-label="Navigation">
    <nav>
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}"{{ if eq $.RelPermalink .URL }} class="active"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer>
    <div class="container">
      <p>&copy; {{ now.Year }} {{ .Site.Params.author }} — Le Pinceau Volant</p>
    </div>
  </footer>

  <script>
    var toggle = document.getElementById('menu-toggle');
    var overlay = document.getElementById('nav-overlay');
    toggle.addEventListener('click', function () {
      var isOpen = document.body.classList.toggle('nav-open');
      toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
    overlay.addEventListener('click', function (e) {
      if (e.target.tagName === 'A') {
        document.body.classList.remove('nav-open');
        toggle.setAttribute('aria-expanded', 'false');
      }
    });
  </script>
</body>
</html>
